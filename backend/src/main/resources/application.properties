spring.application.name=proptech-api

spring.datasource.url=jdbc:postgresql://localhost:5432/proptech_db
spring.datasource.username=proptech_user
spring.datasource.password=proptech_password

spring.jpa.hibernate.ddl-auto=update
#spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=YmFzZTY0LWVuY29kZWQtc2VjcmV0LWtleS10aGF0LW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=
jwt.expiration=86400000

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

app.frontend.url=${FRONTEND_URL:http://localhost:4200}
