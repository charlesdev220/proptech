<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevas propiedades encontradas</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { background-color: #1d4ed8; color: white; padding: 24px; }
    .header h1 { margin: 0; font-size: 20px; }
    .content { padding: 24px; }
    .property-card { border: 1px solid #e5e7eb; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
    .property-title { font-size: 16px; font-weight: bold; color: #111827; margin: 0 0 8px 0; }
    .property-price { font-size: 18px; color: #1d4ed8; font-weight: bold; margin: 0 0 12px 0; }
    .btn { display: inline-block; background-color: #1d4ed8; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none; font-size: 14px; }
    .footer { background-color: #f9fafb; padding: 16px 24px; color: #6b7280; font-size: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Nuevas propiedades para tu búsqueda</h1>
      <p style="margin: 8px 0 0 0; opacity: 0.9;" th:text="${searchName}"></p>
    </div>
    <div class="content">
      <p style="color: #374151; margin-top: 0;">Hemos encontrado inmuebles que coinciden con tu búsqueda guardada:</p>
      <div th:each="prop : ${properties}" class="property-card">
        <p class="property-title" th:text="${prop.title}"></p>
        <p class="property-price" th:text="${#numbers.formatDecimal(prop.price, 0, 'COMMA', 0, 'POINT')} + ' €'"></p>
        <a class="btn" th:href="${frontendUrl + '/property/' + prop.id}">Ver inmueble</a>
      </div>
    </div>
    <div class="footer">
      <p>Recibís este email porque tenés una búsqueda guardada activa en PropTech.</p>
    </div>
  </div>
</body>
</html>
