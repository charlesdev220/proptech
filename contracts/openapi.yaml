openapi: 3.0.3
info:
  title: PropTech API
  description: API REST para la plataforma PropTech (Alquiler & Venta con Red Social de Reputación)
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Entorno de Desarrollo Local
paths:
  /auth/login:
    post:
      summary: Autenticar usuario y obtener JWT
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad Request (RFC 7807)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Credenciales inválidas
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/register:
    post:
      summary: Registrar un nuevo usuario
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuario registrado y token emitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Email ya registrado o datos inválidos
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /properties:
    get:
      summary: Obtener listado de inmuebles (Búsqueda)
      tags:
        - Inmuebles
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: lat
          in: query
          description: Latitud del centro de búsqueda
          schema:
            type: number
            format: float
        - name: lng
          in: query
          description: Longitud del centro de búsqueda
          schema:
            type: number
            format: float
        - name: radius
          in: query
          description: Radio de búsqueda en metros (ej. 5000 para 5km)
          schema:
            type: number
            format: float
      responses:
        '200':
          description: Listado paginado de inmuebles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagePropertyDTO'
    post:
      summary: Crear un nuevo inmueble
      tags:
        - Inmuebles
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyCreateDTO'
      responses:
        '201':
          description: Inmueble creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyDTO'
        '400':
          description: Error de validación
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: No autorizado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /properties/{id}:
    get:
      summary: Obtener el detalle completo de un inmueble
      tags:
        - Inmuebles
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalle del inmueble devuelto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyDetailDTO'
        '404':
          description: Inmueble no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /properties/{id}/media:
    get:
      summary: Obtener galería multimedia de un inmueble
      tags:
        - Inmuebles
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Listado de medios del inmueble
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MediaDTO'

  /media/upload:
    post:
      summary: Subir un archivo multimedia (imagen o vídeo)
      tags:
        - Medios
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: El archivo binario
      responses:
        '201':
          description: Archivo subido exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaDTO'
        '400':
          description: Archivo supera límites o formato no permitido
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /media/{id}:
    get:
      summary: Descargar o ver un archivo multimedia
      tags:
        - Medios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Archivo binario (JPEG, PNG, MP4, etc.)
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Archivo no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /profile:
    get:
      summary: Obtener perfil del usuario autenticado
      tags:
        - Perfil
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil de usuario devuelto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileDTO'
        '401':
          description: No autorizado

  /profile/trust-score:
    get:
      summary: Obtener el desglose del Trust Score actual
      tags:
        - Perfil
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Detalle del scoring
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustScoreDTO'

  /profile/documents:
    post:
      summary: Subir un documento (DNI, Nómina) para verificación (KYC)
      tags:
        - Perfil
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                documentType:
                  type: string
                  enum: [DNI, PAYSLIP]
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Documento de verificación subido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaDTO'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        name:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        expiresIn:
          type: integer

    PropertyDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        price:
          type: number
        type:
          type: string
          enum: [RENT, SALE]
        location:
          type: object
          properties:
            latitude:
              type: number
            longitude:
              type: number
            address:
              type: string
        thumbnailUrl:
          type: string
          description: URL de la primera imagen de la propiedad (thumbnail para listados)
        createdAt:
          type: string
          format: date-time

    PropertyDetailDTO:
      allOf:
        - $ref: '#/components/schemas/PropertyDTO'
        - type: object
          properties:
            owner:
              $ref: '#/components/schemas/UserProfileDTO'
            fullAddress:
              type: string
            features:
              type: object
              properties:
                rooms:
                  type: integer
                bathrooms:
                  type: integer
                surface:
                  type: number
                  description: Superficie en m2.
                hasElevator:
                  type: boolean
                hasParking:
                  type: boolean
                energyCertificate:
                  type: string
                  enum: [A, B, C, D, E, F, G]
            mediaPreviews:
              type: array
              items:
                $ref: '#/components/schemas/MediaDTO'

    PropertyCreateDTO:
      type: object
      required:
        - title
        - price
        - type
        - location
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        type:
          type: string
          enum: [RENT, SALE]
        location:
          type: object
          properties:
            latitude:
              type: number
            longitude:
              type: number
            address:
              type: string
        mediaIds:
          type: array
          items:
            type: string
            format: uuid
        features:
          type: object
          properties:
            rooms:
              type: integer
            bathrooms:
              type: integer
            surface:
              type: number
            hasElevator:
              type: boolean
            hasParking:
              type: boolean
            energyCertificate:
              type: string
              enum: [A, B, C, D, E, F, G]

    PagePropertyDTO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/PropertyDTO'
        totalElements:
          type: integer
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    MediaDTO:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: URL pública de la imagen en S3.
        fileName:
          type: string
        size:
          type: integer
          format: int64
          description: Tamaño en bytes.

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

    UserProfileDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        trustScore:
          type: integer
        isVerified:
          type: boolean

    TrustScoreDTO:
      type: object
      properties:
        totalScore:
          type: integer
        level:
          type: string
          enum: [BRONZE, SILVER, GOLD, PLATINUM]
        factors:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              points:
                type: integer
              description:
                type: string
