openapi: 3.0.3
info:
  title: PropTech API
  description: API REST para la plataforma PropTech (Alquiler & Venta con Red Social de Reputación)
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Entorno de Desarrollo Local
paths:
  /auth/login:
    post:
      summary: Autenticar usuario y obtener JWT
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad Request (RFC 7807)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Credenciales inválidas
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/register:
    post:
      summary: Registrar un nuevo usuario
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuario registrado y token emitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Email ya registrado o datos inválidos
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /properties:
    get:
      summary: Obtener listado de inmuebles (Búsqueda)
      tags:
        - Inmuebles
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: lat
          in: query
          description: Latitud del centro de búsqueda
          schema:
            type: number
            format: float
        - name: lng
          in: query
          description: Longitud del centro de búsqueda
          schema:
            type: number
            format: float
        - name: radius
          in: query
          description: Radio de búsqueda en metros (ej. 5000 para 5km)
          schema:
            type: number
            format: float
      responses:
        '200':
          description: Listado paginado de inmuebles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagePropertyDTO'
    post:
      summary: Crear un nuevo inmueble
      tags:
        - Inmuebles
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyCreateDTO'
      responses:
        '201':
          description: Inmueble creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyDTO'
        '400':
          description: Error de validación
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: No autorizado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /properties/{id}:
    get:
      summary: Obtener el detalle completo de un inmueble
      tags:
        - Inmuebles
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalle del inmueble devuelto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyDetailDTO'
        '404':
          description: Inmueble no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /properties/{id}/media:
    get:
      summary: Obtener galería multimedia de un inmueble
      tags:
        - Inmuebles
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Listado de medios del inmueble
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MediaDTO'

  /media/upload:
    post:
      summary: Subir un archivo multimedia (imagen o vídeo)
      tags:
        - Medios
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: El archivo binario
      responses:
        '201':
          description: Archivo subido exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaDTO'
        '400':
          description: Archivo supera límites o formato no permitido
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /media/{id}:
    get:
      summary: Descargar o ver un archivo multimedia
      tags:
        - Medios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Archivo binario (JPEG, PNG, MP4, etc.)
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Archivo no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /profile:
    get:
      summary: Obtener perfil del usuario autenticado
      tags:
        - Perfil
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil de usuario devuelto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileDTO'
        '401':
          description: No autorizado

  /profile/trust-score:
    get:
      summary: Obtener el desglose del Trust Score actual
      tags:
        - Perfil
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Detalle del scoring
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustScoreDTO'

  /properties/search:
    post:
      summary: Búsqueda avanzada de inmuebles con soporte de polígono GeoJSON
      tags:
        - Inmuebles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertySearchRequest'
      responses:
        '200':
          description: Listado paginado de inmuebles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagePropertyDTO'
        '400':
          description: Parámetros inválidos o GeoJSON mal formado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /neighborhoods:
    get:
      summary: Obtener lista de barrios con sus polígonos
      tags:
        - Barrios
      responses:
        '200':
          description: Lista de barrios con geometría GeoJSON
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NeighborhoodDTO'

  /saved-searches:
    get:
      summary: Listar búsquedas guardadas del usuario autenticado
      tags:
        - Alertas
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de búsquedas guardadas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SavedSearchDTO'
        '401':
          description: No autorizado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    post:
      summary: Crear una nueva búsqueda guardada
      tags:
        - Alertas
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavedSearchCreateRequest'
      responses:
        '201':
          description: Búsqueda guardada creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedSearchDTO'
        '401':
          description: No autorizado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '422':
          description: Límite de búsquedas guardadas alcanzado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /saved-searches/{id}:
    patch:
      summary: Activar o desactivar una búsqueda guardada
      tags:
        - Alertas
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - active
              properties:
                active:
                  type: boolean
      responses:
        '200':
          description: Búsqueda guardada actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedSearchDTO'
        '401':
          description: No autorizado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Acceso denegado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Búsqueda guardada no encontrada
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    delete:
      summary: Eliminar una búsqueda guardada
      tags:
        - Alertas
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Búsqueda guardada eliminada
        '401':
          description: No autorizado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Acceso denegado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Búsqueda guardada no encontrada
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /profile/solvency-verification:
    post:
      summary: Verificar solvencia subiendo hasta 4 documentos PDF (3 nóminas + 1 contrato). Procesado en memoria — ningún documento es almacenado.
      tags:
        - Perfil
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Verificación procesada. Score calculado y persistido en el perfil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolvencyResultDTO'
        '400':
          description: Archivo inválido (tipo no permitido o supera 5MB)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: No autorizado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /reviews/tokens:
    post:
      summary: Crear un token de valoración (vinculado a un evento de visita o contrato)
      tags:
        - Reseñas
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewTokenCreateRequest'
      responses:
        '201':
          description: Token de valoración creado y email de invitación enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewTokenDTO'
        '401':
          description: No autorizado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /reviews/token/{token}:
    get:
      summary: Obtener información de un token de valoración para pre-poblar el formulario
      tags:
        - Reseñas
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Información del token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewTokenInfoDTO'
        '403':
          description: Token no pertenece al usuario autenticado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Token no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /reviews:
    post:
      summary: Enviar una valoración usando un token de un solo uso
      tags:
        - Reseñas
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
      responses:
        '201':
          description: Valoración registrada. No visible hasta el reveal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewDTO'
        '400':
          description: Dimensiones inválidas (valor fuera de rango o dimensiones incorrectas para el tipo)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Token no pertenece al usuario autenticado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Token ya utilizado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '410':
          description: Token expirado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /reviews/{id}/dispute:
    patch:
      summary: Marcar una reseña recibida como disputada
      tags:
        - Reseñas
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Reseña marcada como disputada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewDTO'
        '403':
          description: La reseña no pertenece al usuario autenticado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Reseña no encontrada o aún no visible
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /users/{id}/reputation:
    get:
      summary: Obtener el ReputationScore y reseñas visibles de un usuario
      tags:
        - Usuarios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Reputación del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReputationScoreDTO'
        '404':
          description: Usuario no encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /profile/documents:
    post:
      summary: Subir un documento (DNI, Nómina) para verificación (KYC)
      tags:
        - Perfil
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                documentType:
                  type: string
                  enum: [DNI, PAYSLIP]
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Documento de verificación subido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaDTO'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        name:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        expiresIn:
          type: integer

    PropertyDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        price:
          type: number
        type:
          type: string
          enum: [RENT, SALE]
        location:
          type: object
          properties:
            latitude:
              type: number
            longitude:
              type: number
            address:
              type: string
        thumbnailUrl:
          type: string
          description: URL de la primera imagen de la propiedad (thumbnail para listados)
        createdAt:
          type: string
          format: date-time

    PropertyDetailDTO:
      allOf:
        - $ref: '#/components/schemas/PropertyDTO'
        - type: object
          properties:
            owner:
              $ref: '#/components/schemas/UserProfileDTO'
            fullAddress:
              type: string
            features:
              type: object
              properties:
                rooms:
                  type: integer
                bathrooms:
                  type: integer
                surface:
                  type: number
                  description: Superficie en m2.
                hasElevator:
                  type: boolean
                hasParking:
                  type: boolean
                energyCertificate:
                  type: string
                  enum: [A, B, C, D, E, F, G]
            mediaPreviews:
              type: array
              items:
                $ref: '#/components/schemas/MediaDTO'
            minSolvencyScore:
              type: integer
              minimum: 0
              maximum: 100
              description: Score mínimo de solvencia requerido por el propietario

    PropertyCreateDTO:
      type: object
      required:
        - title
        - price
        - type
        - location
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        type:
          type: string
          enum: [RENT, SALE]
        location:
          type: object
          properties:
            latitude:
              type: number
            longitude:
              type: number
            address:
              type: string
        mediaIds:
          type: array
          items:
            type: string
            format: uuid
        features:
          type: object
          properties:
            rooms:
              type: integer
            bathrooms:
              type: integer
            surface:
              type: number
            hasElevator:
              type: boolean
            hasParking:
              type: boolean
            energyCertificate:
              type: string
              enum: [A, B, C, D, E, F, G]
        minSolvencyScore:
          type: integer
          minimum: 0
          maximum: 100
          description: Score mínimo de solvencia requerido para el inquilino (opcional)

    PagePropertyDTO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/PropertyDTO'
        totalElements:
          type: integer
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    MediaDTO:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: URL pública de la imagen en S3.
        fileName:
          type: string
        size:
          type: integer
          format: int64
          description: Tamaño en bytes.

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

    UserProfileDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        trustScore:
          type: integer
        isVerified:
          type: boolean
        solvencyScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        solvencyVerifiedAt:
          type: string
          format: date-time
          nullable: true
        solvencyContractType:
          type: string
          enum: [INDEFINIDO, TEMPORAL, OBRA]
          nullable: true

    TrustScoreDTO:
      type: object
      properties:
        totalScore:
          type: integer
        level:
          type: string
          enum: [BRONZE, SILVER, GOLD, PLATINUM]
        factors:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              points:
                type: integer
              description:
                type: string

    GeoJsonGeometry:
      type: object
      description: Objeto GeoJSON de geometría (Polygon o MultiPolygon)
      properties:
        type:
          type: string
          enum: [Polygon, MultiPolygon]
        coordinates:
          type: array
          items: {}

    PropertySearchRequest:
      type: object
      description: Parámetros de búsqueda avanzada de inmuebles
      properties:
        polygon:
          $ref: '#/components/schemas/GeoJsonGeometry'
          description: Polígono GeoJSON opcional. Si presente, usa ST_Intersects; si no, usa ST_DWithin.
        lat:
          type: number
          format: float
        lng:
          type: number
          format: float
        radius:
          type: number
          format: float
          description: Radio en metros (usado con lat/lng cuando no hay polygon)
        minPrice:
          type: number
        maxPrice:
          type: number
        minRooms:
          type: integer
        page:
          type: integer
          default: 0
        size:
          type: integer
          default: 20

    NeighborhoodDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        polygon:
          $ref: '#/components/schemas/GeoJsonGeometry'

    SavedSearchDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        filters:
          $ref: '#/components/schemas/PropertySearchRequest'
        active:
          type: boolean
        lastCheckedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    SavedSearchCreateRequest:
      type: object
      required:
        - name
        - filters
      properties:
        name:
          type: string
          maxLength: 100
        filters:
          $ref: '#/components/schemas/PropertySearchRequest'

    SolvencyCheckDTO:
      type: object
      properties:
        name:
          type: string
        passed:
          type: boolean
        description:
          type: string

    SolvencyResultDTO:
      type: object
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
        level:
          type: string
          enum: [BRONZE, SILVER, GOLD, PLATINUM]
        checks:
          type: array
          items:
            $ref: '#/components/schemas/SolvencyCheckDTO'
        verifiedAt:
          type: string
          format: date-time
        contractType:
          type: string
          enum: [INDEFINIDO, TEMPORAL, OBRA]
          nullable: true
        documentosCompletos:
          type: boolean

    ReviewTokenCreateRequest:
      type: object
      required:
        - eventType
        - fromUserId
        - toUserId
        - propertyId
      properties:
        eventType:
          type: string
          enum: [VISIT, CONTRACT]
        fromUserId:
          type: string
          format: uuid
        toUserId:
          type: string
          format: uuid
        propertyId:
          type: string
          format: uuid

    ReviewTokenDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        token:
          type: string
          format: uuid
        eventType:
          type: string
