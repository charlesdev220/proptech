version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: proptech-db
    environment:
      POSTGRES_USER: proptech_user
      POSTGRES_PASSWORD: proptech_password
      POSTGRES_DB: proptech_db
    ports:
      - "5432:5432"
    volumes:
      - proptech-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  proptech-data:
